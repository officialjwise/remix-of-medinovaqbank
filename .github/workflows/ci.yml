name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Only run the latest commit per ref; cancel superseded runs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    name: ${{ matrix.task.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task:
          - { name: Lint, run: npm run lint }
          - { name: Typecheck, run: npx tsc --noEmit }
          - { name: Build, run: npm run build }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Node 24 ships npm 11, matching the npm version that generated
      # package-lock.json. Node 22 (npm 10) reads the lock tree differently
      # and breaks `npm ci`.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Pin npm to 11
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: ${{ matrix.task.name }}
        run: ${{ matrix.task.run }}
