# Build the frontend SSR image and push to GHCR.
# VITE_* are compiled into the bundle, so the prod API origin must be supplied at
# build time via repo variables:
#   vars.VITE_API_URL  e.g. https://app.example.com/api/v1
#   vars.VITE_WS_URL   e.g. https://app.example.com
#
# After this pushes :latest, roll it live by running the backend repo's "Deploy"
# workflow (it pulls latest of BOTH images and restarts the stack).
name: Build & Push Frontend

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: frontend-build-main
  cancel-in-progress: true

env:
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/remix-of-medinovaqbank

jobs:
  build-push:
    name: Build & push frontend image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
            VITE_WS_URL=${{ vars.VITE_WS_URL }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
